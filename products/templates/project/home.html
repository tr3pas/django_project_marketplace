
{% extends 'base.html' %}

{% block title %}Головна | Wanted Shop{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Категорії товарів</h1>
    <div class="row">
        {% for category in categories %}
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ category.name }}</h5>
                    <p class="card-text">{{ category.description }}</p>
                    <a href="{% url 'product_list_by_category' category.id %}" class="btn btn-primary">Переглянути товари</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

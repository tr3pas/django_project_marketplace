{% extends 'base.html' %}
{% load socialaccount %}
{% block title %}Реєстрація{% endblock %}
{% block content %}
<div class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-md-6">
			<h2 class="mb-4">Реєстрація</h2>
			<form method="post">
				{% csrf_token %}
				{{ form.as_p }}
				<button type="submit" class="btn btn-primary w-100">Зареєструватися</button>
			</form>
			<p class="mt-3">Вже маєте акаунт? <a href="{% url 'accounts:login' %}">Увійти</a></p>
			<div class="container mt-5 text-center">
                <h3>Вхід через соцмережі</h3> 
                <a href="{% provider_login_url 'google' %}" class="btn btn-outline-danger mt-3">
                <img src="/static/media/google_logo.png" width="20" class="me-2"> Зареєструватися через Google </a>
                
                
            </div>
		</div>
	</div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Вхід{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">Вхід</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Увійти</button>
            </form>
            <p class="mt-3">Немає акаунта? <a href="{% url 'account:register' %}">Зареєструватися</a></p>
        </div>
    </div>
</div>
{% endblock %}
